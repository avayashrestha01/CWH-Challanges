<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Staff Application">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <form action="#" method="POST">
        <h1>Appoinment</h1>
        <div>
            <label for="name">Full Name</label>
            <input type="text" name="name" id="name" placeholder="Full Name" required>
        </div>
        <div>
            <label for="dname">Discord Username</label>
            <input type="text" name="dname" id="dname" placeholder="(eg: admin#0000)" required>
        </div>
        <div>
            <label for="gender">Gender</label>
            <input type="radio" name="gender" id="male" value="male">
            <label class="radio" for="male">Male</label>

            <input type="radio" name="gender" id="female" value="female">
            <label class="radio" for="female">Female</label>

            <input type="radio" name="gender" id="others" value="others">
            <label class="radio" for="others">Others</label>
        </div>
        <div>
            <label for="city">City</label>
            <input type="text" name="city" id="city" placeholder="City, Country" required>
        </div>
        <div>
            <div>
                <label for="reason">Why Should we appoint you?</label>
            </div>
            <textarea name="reason" id="reason" rows="4" cols="36"></textarea>
        </div>
        <div>
            <label for="roles">Which role are you suitable for?</label>
            <select name="roles" id="roles">
                <option value="0" style="color: gray;">none</option>
                <option value="1">Helper</option>
                <option value="2">Upper Helper</option>
                <option value="3">Moderator</option>
                <option value="4">Manager</option>
                <option value="5">Admin</option>
            </select>
        </div>
        <div>
            <button type="submit required" class="btn" id="submit">Submit</button>
        </div>
    </form>
</body>

</html>
