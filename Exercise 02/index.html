<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Exercise 02">
    <title>Windows Media Manager</title>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="#media">Meida</a></li>
                <li><a href="#Form">Form</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="Window media manager" id="media">
            <h1>Windows Media Manager</h1>
            <div id="video">
                <h2>Video Player</h2>
                <video src="1.mp4" controls></video>
                <video src="2.mp4" controls></video>
                <video src="3.mp4" controls></video>
                <video src="4.mp4" controls></video>
                <video src="5.mp4" controls></video>
                <video src="6.mp4" controls></video>
            </div>
            <div id="audio">
                <h2>Audio Player</h2>
                <audio src="1.mp3" controls></audio>
                <audio src="2.mp3" controls></audio>
                <audio src="3.mp3" controls></audio>
                <audio src="4.mp3" controls></audio>
                <audio src="5.mp3" controls></audio>
                <audio src="6.mp3" controls></audio>
            </div>
        </section>
        <section id="Form">
            <h1>Rate the website</h1>
            <form action="">
                <div>
                    <label for="name"></label>
                    <input type="text" name="name" id="name" placeholder="name">
                </div>
                <div>
                    <label for="gender">Gender</label>
                    <input type="radio" name="gender" id="male">
                    <label for="male">Male</label>
                    <input type="radio" name="gender" id="female">
                    <label for="female">Female</label>
                </div>
                <label for="rate">Rate</label>
                <select name="rate" id="rate">
                    <option value="5">5 star</option>
                    <option value="4">4 star</option>
                    <option value="3">3 star</option>
                    <option value="2">2 star</option>
                    <option value="1">1 star</option>
                </select>
                <div>
                    <button>Submit</button>
                </div>
            </form>
        </section>
    </main>
</body>

</html>
